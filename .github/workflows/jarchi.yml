name: jarchi

on: [push, workflow_dispatch]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: 'true'

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Set up Maven
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: 3.9.12

    # Запускаем сборку (verify включает в себя package) без clean
    - name: Run Maven Build (Linux with virtual display)
      if: ${{ runner.os == 'Linux' }}
      run: xvfb-run mvn verify -DskipTests

    - name: Run Maven Build (macOS/Windows)
      if: ${{ runner.os != 'Linux' }}
      run: mvn verify -DskipTests

    # Собираем все .jar файлы плагинов из всех папок target
    - name: Upload All Compiled Plugins
      uses: actions/upload-artifact@v4
      with:
        name: Archi-Plugins-${{ matrix.os }}
        path: "**/target/*.jar"
        # Исключаем лишние jar (исходники и javadoc), если они генерируются
        exclude: |
          **/target/*-sources.jar
          **/target/*-javadoc.jar
